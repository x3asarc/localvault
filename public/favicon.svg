<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f0f12"/>

  <!-- Vault door ring -->
  <circle cx="32" cy="32" r="24" stroke="#6366f1" stroke-width="2.5" fill="#1a1a2e"/>
  <circle cx="32" cy="32" r="17" stroke="#6366f1" stroke-width="1.5" fill="none" stroke-dasharray="4 2"/>

  <!-- Center node -->
  <circle cx="32" cy="32" r="4" fill="#818cf8"/>

  <!-- Knowledge graph spokes -->
  <line x1="32" y1="28" x2="32" y2="18" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35.5" y1="29" x2="43" y2="23" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35.5" y1="35" x2="43" y2="41" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="36" x2="32" y2="46" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28.5" y1="35" x2="21" y2="41" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28.5" y1="29" x2="21" y2="23" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Outer nodes -->
  <circle cx="32" cy="17" r="2.5" fill="#c7d2fe"/>
  <circle cx="44" cy="22" r="2.5" fill="#c7d2fe"/>
  <circle cx="44" cy="42" r="2.5" fill="#c7d2fe"/>
  <circle cx="32" cy="47" r="2.5" fill="#c7d2fe"/>
  <circle cx="20" cy="42" r="2.5" fill="#c7d2fe"/>
  <circle cx="20" cy="22" r="2.5" fill="#c7d2fe"/>

  <!-- Vault handle -->
  <circle cx="32" cy="32" r="6" stroke="#6366f1" stroke-width="1.5" fill="none"/>
</svg>
